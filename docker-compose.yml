services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - ${SSD_DATA_PATH:-./mongo_data}:/data/db

  backend-api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5002:8000"
    restart: unless-stopped
    volumes:
      - ./media_data:/app/media 
    depends_on:
      - mongodb


  fetcher:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file: .env
    command: ["/usr/local/bin/start.sh", "fetcher"]
    restart: unless-stopped
    volumes:
      - ./media_data:/app/media
    depends_on:
      - mongodb

  # --- VITE FRONTEND ---
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend-api:5002}
    ports:
      - "5003:80"
    restart: unless-stopped
    
    depends_on:
      - backend-api